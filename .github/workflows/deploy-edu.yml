name: Deploy → https://edu.forges-group.com

on:
  workflow_dispatch:
    inputs:
      image_sha:
        description: 'SHA de commit de l image backend a deployer'
        required: false
        default: ''

# Groupe separe : edu tourne apres dev, pas de race Docker possible
concurrency:
  group: forges-edu-deploy
  cancel-in-progress: false

env:
  NODE_VERSION: '20'

jobs:
  build-frontend:
    name: Build frontend Vite (EDU)
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: forges-monorepo/frontend/package-lock.json

      - name: Installer dependances frontend
        working-directory: forges-monorepo/frontend
        run: npm ci --no-audit --no-fund

      - name: Build Vite (EDU)
        working-directory: forges-monorepo/frontend
        env:
          VITE_API_URL: https://edu.forges-group.com/api
          VITE_ENV: edu
          VITE_COMMIT_SHA: ${{ inputs.image_sha || github.sha }}
        run: npm run build

      - name: Upload dist frontend
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist-edu
          path: forges-monorepo/frontend/dist/
          retention-days: 1
          include-hidden-files: true

  deploy:
    name: Deploiement sur edu
    runs-on: ubuntu-22.04
    needs: [build-frontend]
    environment:
      name: edu
      url: https://edu.forges-group.com

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download dist frontend
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist-edu
          path: frontend-dist/

      - name: Configurer SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          echo "${{ secrets.SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Transferer frontend (rsync)
        run: |
          rsync -rltz --delete --omit-dir-times --no-perms --no-group \
            --chmod=D755,F644 \
            --exclude='.env' --exclude='infra/' --exclude='uploads/' --exclude='prisma/' \
            frontend-dist/ \
            ${{ secrets.DEV_SERVER_USER }}@${{ secrets.DEV_SERVER_HOST }}:${{ secrets.EDU_FRONTEND_DEPLOY_PATH }}/

      - name: Corriger permissions frontend
        run: |
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no \
            ${{ secrets.DEV_SERVER_USER }}@${{ secrets.DEV_SERVER_HOST }} \
            "find ${{ secrets.EDU_FRONTEND_DEPLOY_PATH }} -not -path '*/.env' -not -path '*/infra/*' -not -path '*/uploads/*' -type f -exec chmod 644 {} \; && find ${{ secrets.EDU_FRONTEND_DEPLOY_PATH }} -type d -exec chmod 755 {} \;"

      - name: Transferer docker-compose edu (rsync)
        run: |
          rsync -avz --mkpath \
            infra/docker/docker-compose.edu.deploy.yml \
            ${{ secrets.DEV_SERVER_USER }}@${{ secrets.DEV_SERVER_HOST }}:${{ secrets.DEV_DEPLOY_PATH }}/infra/docker/

      - name: Docker pull + migrate + restart (EDU)
        env:
          DEPLOY_PATH: ${{ secrets.DEV_DEPLOY_PATH }}
          SERVER_USER: ${{ secrets.DEV_SERVER_USER }}
          SERVER_HOST: ${{ secrets.DEV_SERVER_HOST }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          GHCR_USER: ${{ github.actor }}
          IMAGE_TAG: ${{ inputs.image_sha || github.sha }}
          EDU_ENV_DEPLOY: ${{ secrets.EDU_ENV_DEPLOY }}
        run: |
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no $SERVER_USER@$SERVER_HOST \
            DEPLOY_PATH="$DEPLOY_PATH" \
            GHCR_TOKEN="$GHCR_TOKEN" \
            GHCR_USER="$GHCR_USER" \
            IMAGE_TAG="$IMAGE_TAG" \
            EDU_ENV_DEPLOY="$EDU_ENV_DEPLOY" \
            bash -s << 'ENDSSH'
              set -euo pipefail
              mkdir -p "$DEPLOY_PATH/infra/docker" "$DEPLOY_PATH/infra/env"
              cd "$DEPLOY_PATH"
              RESOLVED_IMAGE_TAG="$IMAGE_TAG"

              # Cree le fichier .env.edu.deploy s'il n'existe pas (premier deploy)
              if [ ! -f infra/env/.env.edu.deploy ]; then
                echo "$EDU_ENV_DEPLOY" | base64 -d > infra/env/.env.edu.deploy
              fi

              echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin

              # Recupere l'image backend deja buildee. Si la version SHA n'existe pas
              # (cas d'un commit avec skip ci ou d'un build interrompu), on bascule
              # sur le tag dev pour eviter un echec "manifest unknown".
              if docker manifest inspect ghcr.io/flinguee75/forges-backend:dev-$IMAGE_TAG >/dev/null 2>&1; then
                docker pull ghcr.io/flinguee75/forges-backend:dev-$IMAGE_TAG
                RESOLVED_IMAGE_REF="ghcr.io/flinguee75/forges-backend:dev-$IMAGE_TAG"
              else
                echo "Image dev-$IMAGE_TAG introuvable, fallback sur le tag dev"
                RESOLVED_IMAGE_TAG="dev"
                docker pull ghcr.io/flinguee75/forges-backend:dev
                RESOLVED_IMAGE_REF="ghcr.io/flinguee75/forges-backend:dev"
              fi

              # Met a jour l'image backend resolue dans les fichiers de deploy
              sed -i '/^BACKEND_IMAGE_REF=/d' .env
              echo "BACKEND_IMAGE_REF=$RESOLVED_IMAGE_REF" >> .env

              # Garde aussi le fichier de deploy edu synchronise pour le suivi manuel
              sed -i '/^BACKEND_IMAGE_REF=/d' infra/env/.env.edu.deploy
              echo "BACKEND_IMAGE_REF=$RESOLVED_IMAGE_REF" >> infra/env/.env.edu.deploy

              # Nettoyage containers edu existants
              ZOMBIES=$(docker ps -a --format '{{.Names}}' | grep -E '(^|_)forges-(backend|postgres|redis)-edu$' || true)
              if [ -n "$ZOMBIES" ]; then
                echo "$ZOMBIES" | xargs -r docker rm -f 2>/dev/null || true
              fi

              docker compose -f infra/docker/docker-compose.edu.deploy.yml \
                --env-file .env up -d

              echo "Attente healthcheck backend edu..."
              for i in $(seq 1 30); do
                STATUS=$(docker inspect --format='{{.State.Health.Status}}' forges-backend-edu 2>/dev/null || echo "missing")
                echo "  [$i/30] $STATUS"
                [ "$STATUS" = "healthy" ] && break
                sleep 5
              done

              echo "Synchronisation schema Prisma (db push)..."
              for attempt in 1 2 3; do
                docker exec forges-backend-edu sh -c 'cd /app && npx prisma db push --skip-generate --accept-data-loss' && break
                echo "  Tentative $attempt echouee, retry dans 10s..."
                sleep 10
              done
              echo "Schema OK"
          ENDSSH

      - name: Healthcheck
        run: |
          sleep 8
          HTTP_CODE=$(curl -sk -o /dev/null -w "%{http_code}" https://edu.forges-group.com/health || echo "000")
          [ "$HTTP_CODE" = "200" ] && echo "EDU OK" || echo "Healthcheck: $HTTP_CODE"

      - name: Resume
        if: always()
        run: |
          echo "## Deploy EDU -- ${{ inputs.image_sha || github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "| Champ | Valeur |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| URL | https://edu.forges-group.com |" >> $GITHUB_STEP_SUMMARY
          echo "| Image demandee | ghcr.io/flinguee75/forges-backend:dev-${{ inputs.image_sha || github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Fallback | tag dev si la version SHA est absente |" >> $GITHUB_STEP_SUMMARY
          echo "| Backend | forges-backend-edu (port 3006) |" >> $GITHUB_STEP_SUMMARY
          echo "| DB | forges_edu (independante de dev) |" >> $GITHUB_STEP_SUMMARY
          echo "| Deploye par | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY

      - name: Nettoyer cle SSH
        if: always()
        run: rm -f ~/.ssh/id_rsa
