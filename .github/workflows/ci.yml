# =============================================================
# ci.yml — Intégration Continue FORGES
# Déclencheur : push sur toute branche + pull requests
# Actions :
#   1. Lint backend (TypeScript) + frontend (ESLint)
#   2. Tests unitaires backend (MOD-01→15) + couverture
#   3. Tests d'intégration backend (routes HTTP)
#   4. Tests unitaires frontend (Vitest)
#   5. Build TypeScript + Build Vite
# =============================================================

name: CI — Tests & Build

on:
  push:
    branches: ['**']
  pull_request:
    branches: [develop, test, main]

env:
  NODE_VERSION: '20'

jobs:
  # ── Job 0 : Lint ─────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: |
            forges-monorepo/backend/package-lock.json
            forges-monorepo/frontend/package-lock.json

      - name: Installer dépendances backend
        working-directory: forges-monorepo/backend
        run: npm ci --no-audit --no-fund

      - name: Lint backend
        working-directory: forges-monorepo/backend
        run: npm run lint

      - name: Installer dépendances frontend
        working-directory: forges-monorepo/frontend
        run: npm ci --no-audit --no-fund

      - name: Lint frontend
        working-directory: forges-monorepo/frontend
        run: npm run lint

  # ── Job 1 : Tests unitaires backend ─────────────────────────
  test-backend:
    name: Tests unitaires backend
    runs-on: ubuntu-22.04
    continue-on-error: true

    services:
      # PostgreSQL de test (éphémère)
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: forges_test
          POSTGRES_PASSWORD: forges_test_pass
          POSTGRES_DB: forges_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          -e POSTGRES_SHARED_PRELOAD_LIBRARIES=""
        command: postgres -c max_connections=200

      # Redis de test (éphémère)
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: forges-monorepo/backend/package-lock.json

      - name: Installer les dépendances backend
        working-directory: forges-monorepo/backend
        run: npm ci --no-audit --no-fund

      - name: Générer le client Prisma
        working-directory: forges-monorepo/backend
        run: npx prisma generate

      - name: Appliquer les migrations de test
        working-directory: forges-monorepo/backend
        env:
          DATABASE_URL: postgresql://forges_test:forges_test_pass@localhost:5432/forges_test
        run: npx prisma migrate deploy

      - name: Verifier drift schema vs migrations
        working-directory: forges-monorepo/backend
        env:
          DATABASE_URL: postgresql://forges_test:forges_test_pass@localhost:5432/forges_test
        run: |
          DRIFT=$(npx prisma migrate diff \
            --from-migrations prisma/migrations \
            --to-schema-datamodel prisma/schema.prisma \
            --shadow-database-url postgresql://forges_test:forges_test_pass@localhost:5432/forges_test \
            --exit-code 2>&1 || true)
          if echo "$DRIFT" | grep -qE "^[+-]"; then
            echo "ERREUR : le schema.prisma contient des champs sans migration correspondante."
            echo "$DRIFT"
            echo "Lancez 'npx prisma migrate dev --name <nom>' en local pour creer la migration manquante."
            exit 1
          fi
          echo "Schema en sync avec les migrations."

      - name: Exécuter les tests unitaires
        working-directory: forges-monorepo/backend
        env:
          DATABASE_URL: postgresql://forges_test:forges_test_pass@localhost:5432/forges_test?connection_limit=5
          REDIS_URL: redis://localhost:6379
          NODE_ENV: test
          JWT_SECRET: ci_jwt_secret_not_for_production_64chars_minimum_required
          JWT_REFRESH_SECRET: ci_refresh_secret_not_for_production_64chars_minimum
          ENCRYPTION_KEY: ci_encryption_key_32bytes_hex_not_for_prod_change_me_now
          AES_SECRET_KEY: Y2ktdGVzdC1rZXktZm9yZ2VzMjAyNmNpLXRlc3Qta2U=
          HMAC_KEY: ci_hmac_key_32bytes_hex_not_for_production_change_me_now
          WEBHOOK_SECRET: ci_webhook_secret_not_for_production
          SMTP_HOST: localhost
          FRONTEND_URL: http://localhost:5173
          FINEO_BUSINESS_CODE: ci_fineo_business_code_not_for_production
          FINEO_API_KEY: ci_fineo_api_key_not_for_production
          NGSER_AUTH_TOKEN: ci_ngser_auth_token_not_for_production
          NGSER_AUTHENTICATION_TOKEN: ci_ngser_auth_token_not_for_production
          NGSER_OPERATION_TOKEN_PAIEMENT: ci_ngser_operation_token_not_for_production
        run: |
          mkdir -p test-results
          set +e
          npm run test:coverage -- --json --outputFile=test-results/backend-unit.json
          TEST_EXIT=$?
          if [ "$TEST_EXIT" -ne 0 ]; then
            echo "[threshold] jest exited with code $TEST_EXIT; evaluating pass-rate gate"
          fi
          node ../scripts/check-test-threshold.mjs \
            --report test-results/backend-unit.json \
            --min 0.95 \
            --label "backend unitaires"
          THRESHOLD_EXIT=$?
          if [ "$THRESHOLD_EXIT" -ne 0 ]; then
            exit "$THRESHOLD_EXIT"
          fi
          exit 0

      - name: Uploader le rapport de couverture
        uses: actions/upload-artifact@v4
        if: always()   # Même si les tests échouent
        with:
          name: coverage-report-${{ github.sha }}
          path: forges-monorepo/backend/coverage/
          retention-days: 30

      - name: Afficher le résumé de couverture
        working-directory: forges-monorepo/backend
        run: |
          echo "## 📊 Couverture des tests" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f coverage/coverage-summary.json ]; then
            node -e "
              const s = require('./coverage/coverage-summary.json').total;
              console.log('| Métrique | Couverture |');
              console.log('|----------|-----------|');
              console.log('| Lignes   | ' + s.lines.pct + '% |');
              console.log('| Branches | ' + s.branches.pct + '% |');
              console.log('| Fonctions| ' + s.functions.pct + '% |');
              console.log('| Statements | ' + s.statements.pct + '% |');
            " >> $GITHUB_STEP_SUMMARY
          fi

  # ── Job 2 : Tests d'intégration backend ─────────────────────
  test-integration:
    name: Tests d'intégration backend
    runs-on: ubuntu-22.04
    needs: test-backend
    timeout-minutes: 20
    continue-on-error: true

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: forges_test
          POSTGRES_PASSWORD: forges_test_pass
          POSTGRES_DB: forges_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        command: postgres -c max_connections=200

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: forges-monorepo/backend/package-lock.json

      - name: Installer les dépendances backend
        working-directory: forges-monorepo/backend
        run: npm ci --no-audit --no-fund

      - name: Générer le client Prisma
        working-directory: forges-monorepo/backend
        run: npx prisma generate

      - name: Appliquer les migrations
        working-directory: forges-monorepo/backend
        env:
          DATABASE_URL: postgresql://forges_test:forges_test_pass@localhost:5432/forges_test
        run: npx prisma migrate deploy

      - name: Verifier drift schema vs migrations
        working-directory: forges-monorepo/backend
        env:
          DATABASE_URL: postgresql://forges_test:forges_test_pass@localhost:5432/forges_test
        run: |
          DRIFT=$(npx prisma migrate diff \
            --from-migrations prisma/migrations \
            --to-schema-datamodel prisma/schema.prisma \
            --shadow-database-url postgresql://forges_test:forges_test_pass@localhost:5432/forges_test \
            --exit-code 2>&1 || true)
          if echo "$DRIFT" | grep -qE "^[+-]"; then
            echo "ERREUR : le schema.prisma contient des champs sans migration correspondante."
            echo "$DRIFT"
            echo "Lancez 'npx prisma migrate dev --name <nom>' en local pour creer la migration manquante."
            exit 1
          fi
          echo "Schema en sync avec les migrations."

      - name: Charger les données de test E2E
        working-directory: forges-monorepo/backend
        env:
          DATABASE_URL: postgresql://forges_test:forges_test_pass@localhost:5432/forges_test
          NODE_ENV: test
          JWT_SECRET: ci_jwt_secret_not_for_production_64chars_minimum_required
          JWT_REFRESH_SECRET: ci_refresh_secret_not_for_production_64chars_minimum
          ENCRYPTION_KEY: ci_encryption_key_32bytes_hex_not_for_prod_change_me_now
          AES_SECRET_KEY: Y2ktdGVzdC1rZXktZm9yZ2VzMjAyNmNpLXRlc3Qta2U=
          HMAC_KEY: ci_hmac_key_32bytes_hex_not_for_production_change_me_now
          WEBHOOK_SECRET: ci_webhook_secret_not_for_production
          SMTP_HOST: localhost
          FRONTEND_URL: http://localhost:5173
        run: npm run prisma:seed:e2e

      - name: Exécuter les tests d'intégration
        working-directory: forges-monorepo/backend
        env:
          DATABASE_URL: postgresql://forges_test:forges_test_pass@localhost:5432/forges_test?connection_limit=5
          REDIS_URL: redis://localhost:6379
          NODE_ENV: test
          JWT_SECRET: ci_jwt_secret_not_for_production_64chars_minimum_required
          JWT_REFRESH_SECRET: ci_refresh_secret_not_for_production_64chars_minimum
          ENCRYPTION_KEY: ci_encryption_key_32bytes_hex_not_for_prod_change_me_now
          AES_SECRET_KEY: Y2ktdGVzdC1rZXktZm9yZ2VzMjAyNmNpLXRlc3Qta2U=
          HMAC_KEY: ci_hmac_key_32bytes_hex_not_for_production_change_me_now
          WEBHOOK_SECRET: ci_webhook_secret_not_for_production
          SMTP_HOST: localhost
          FRONTEND_URL: http://localhost:5173
          FINEO_BUSINESS_CODE: ci_fineo_business_code_not_for_production
          FINEO_API_KEY: ci_fineo_api_key_not_for_production
          NGSER_AUTH_TOKEN: ci_ngser_auth_token_not_for_production
          NGSER_AUTHENTICATION_TOKEN: ci_ngser_auth_token_not_for_production
          NGSER_OPERATION_TOKEN_PAIEMENT: ci_ngser_operation_token_not_for_production
        run: |
          mkdir -p test-results
          set +e
          npm run test:integration -- --json --outputFile=test-results/backend-integration.json
          TEST_EXIT=$?
          if [ "$TEST_EXIT" -ne 0 ]; then
            echo "[threshold] jest exited with code $TEST_EXIT; evaluating pass-rate gate"
          fi
          node ../scripts/check-test-threshold.mjs \
            --report test-results/backend-integration.json \
            --min 0.95 \
            --label "backend integration"
          THRESHOLD_EXIT=$?
          if [ "$THRESHOLD_EXIT" -ne 0 ]; then
            exit "$THRESHOLD_EXIT"
          fi
          exit 0

  # ── Job 3 : Build TypeScript ─────────────────────────────────
  build-backend:
    name: Build TypeScript
    runs-on: ubuntu-22.04
    needs: [test-backend, test-integration]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: forges-monorepo/backend/package-lock.json

      - name: Installer les dépendances
        working-directory: forges-monorepo/backend
        run: npm ci --no-audit --no-fund

      - name: Générer le client Prisma
        working-directory: forges-monorepo/backend
        run: npx prisma generate

      - name: Compiler TypeScript
        working-directory: forges-monorepo/backend
        run: npm run build

      - name: Uploader le build (artefact)
        uses: actions/upload-artifact@v4
        with:
          name: backend-build-${{ github.sha }}
          path: forges-monorepo/backend/dist/
          retention-days: 7

  # ── Job 4 : Tests unitaires frontend ─────────────────────────
  test-frontend:
    name: Tests unitaires frontend
    runs-on: ubuntu-22.04
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: forges-monorepo/frontend/package-lock.json

      - name: Installer les dépendances
        working-directory: forges-monorepo/frontend
        run: npm ci --no-audit --no-fund

      - name: Exécuter les tests Vitest
        working-directory: forges-monorepo/frontend
        run: |
          mkdir -p test-results
          set +e
          npm run test -- --run --reporter=json --outputFile=test-results/frontend-unit.json
          TEST_EXIT=$?
          if [ "$TEST_EXIT" -ne 0 ]; then
            echo "[threshold] vitest exited with code $TEST_EXIT; evaluating pass-rate gate"
          fi
          node ../scripts/check-test-threshold.mjs \
            --report test-results/frontend-unit.json \
            --min 0.95 \
            --label "frontend unitaires"
          THRESHOLD_EXIT=$?
          if [ "$THRESHOLD_EXIT" -ne 0 ]; then
            exit "$THRESHOLD_EXIT"
          fi
          exit 0

  # ── Job 5 : Build frontend ────────────────────────────────────
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-22.04
    needs: test-frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: forges-monorepo/frontend/package-lock.json

      - name: Installer les dépendances
        working-directory: forges-monorepo/frontend
        run: npm ci --no-audit --no-fund

      - name: Build Vite
        working-directory: forges-monorepo/frontend
        env:
          VITE_API_URL: https://test.forges-group.com/api
        run: npm run build

      - name: Uploader le build frontend
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build-${{ github.sha }}
          path: forges-monorepo/frontend/dist/
          retention-days: 7

  # ── Job 6 : Smoke API (Playwright API-level) ──────────────────
  smoke-api:
    name: Smoke API partenaire
    runs-on: ubuntu-22.04
    needs: [test-integration]
    continue-on-error: true

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: forges_test
          POSTGRES_PASSWORD: forges_test_pass
          POSTGRES_DB: forges_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        command: postgres -c max_connections=200

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: |
            forges-monorepo/backend/package-lock.json
            forges-monorepo/frontend/package-lock.json

      - name: Installer les dépendances backend
        working-directory: forges-monorepo/backend
        run: npm ci --no-audit --no-fund

      - name: Générer le client Prisma
        working-directory: forges-monorepo/backend
        run: npx prisma generate

      - name: Appliquer les migrations
        working-directory: forges-monorepo/backend
        env:
          DATABASE_URL: postgresql://forges_test:forges_test_pass@localhost:5432/forges_test
        run: npx prisma migrate deploy

      - name: Charger les fixtures E2E
        working-directory: forges-monorepo/backend
        env:
          DATABASE_URL: postgresql://forges_test:forges_test_pass@localhost:5432/forges_test
          NODE_ENV: test
          JWT_SECRET: ci_jwt_secret_not_for_production_64chars_minimum_required
          JWT_REFRESH_SECRET: ci_refresh_secret_not_for_production_64chars_minimum
          ENCRYPTION_KEY: ci_encryption_key_32bytes_hex_not_for_prod_change_me_now
          AES_SECRET_KEY: Y2ktdGVzdC1rZXktZm9yZ2VzMjAyNmNpLXRlc3Qta2U=
          HMAC_KEY: ci_hmac_key_32bytes_hex_not_for_production_change_me_now
          WEBHOOK_SECRET: ci_webhook_secret_not_for_production
          SMTP_HOST: localhost
          FRONTEND_URL: http://localhost:5173
        run: npm run prisma:seed:e2e

      - name: Démarrer le backend en arrière-plan
        working-directory: forges-monorepo/backend
        env:
          DATABASE_URL: postgresql://forges_test:forges_test_pass@localhost:5432/forges_test?connection_limit=5
          REDIS_URL: redis://localhost:6379
          NODE_ENV: test
          PORT: 3000
          JWT_SECRET: ci_jwt_secret_not_for_production_64chars_minimum_required
          JWT_REFRESH_SECRET: ci_refresh_secret_not_for_production_64chars_minimum
          ENCRYPTION_KEY: ci_encryption_key_32bytes_hex_not_for_prod_change_me_now
          AES_SECRET_KEY: Y2ktdGVzdC1rZXktZm9yZ2VzMjAyNmNpLXRlc3Qta2U=
          HMAC_KEY: ci_hmac_key_32bytes_hex_not_for_production_change_me_now
          WEBHOOK_SECRET: ci_webhook_secret_not_for_production
          SMTP_HOST: localhost
          FRONTEND_URL: http://localhost:5173
          FINEO_BUSINESS_CODE: ci_fineo_business_code_not_for_production
          FINEO_API_KEY: ci_fineo_api_key_not_for_production
          NGSER_AUTH_TOKEN: ci_ngser_auth_token_not_for_production
          NGSER_AUTHENTICATION_TOKEN: ci_ngser_auth_token_not_for_production
          NGSER_OPERATION_TOKEN_PAIEMENT: ci_ngser_operation_token_not_for_production
        run: npm run start:e2e &

      - name: Attendre que le backend soit prêt
        run: |
          for i in $(seq 1 30); do
            if curl -s http://localhost:3000/api/health > /dev/null 2>&1; then
              echo "Backend ready after ${i}s"
              break
            fi
            sleep 2
          done

      - name: Installer les dépendances frontend
        working-directory: forges-monorepo/frontend
        run: npm ci --no-audit --no-fund

      - name: Installer Playwright (chromium uniquement)
        working-directory: forges-monorepo/frontend
        run: npx playwright install chromium --with-deps

      - name: Exécuter les tests smoke et regression partenaire
        working-directory: forges-monorepo/frontend
        env:
          E2E_API_URL: http://localhost:3000/api
          WEBHOOK_SECRET: ci_webhook_secret_not_for_production
        run: |
          npx playwright test \
            e2e/partenaire-smoke.spec.js \
            e2e/partenaire-seeded-regression.spec.js \
            --project=chromium \
            --reporter=list

      - name: Uploader le rapport Playwright
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-smoke-${{ github.sha }}
          path: forges-monorepo/frontend/test-results/
          retention-days: 7
