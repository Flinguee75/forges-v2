name: Deploy → https://demo.forges-group.com

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:

# Tous les deploys (test, dev, demo) ciblent le meme serveur Docker.
# On serialise pour eviter les races sur le daemon Docker (ex: container
# d'un autre env vu en "removal in progress" pendant un compose up).
concurrency:
  group: forges-server-deploy
  cancel-in-progress: false

env:
  IMAGE_NAME: ghcr.io/flinguee75/forges-backend
  NODE_VERSION: '20'

jobs:
  build-push:
    name: Build image backend → GHCR
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build & push image backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/docker/Dockerfile.backend.prod
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:demo
            ${{ env.IMAGE_NAME }}:demo-${{ github.sha }}

  build-frontend:
    name: Build frontend Vite
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: forges-monorepo/frontend/package-lock.json

      - name: Installer dépendances frontend
        working-directory: forges-monorepo/frontend
        run: npm ci --no-audit --no-fund

      - name: Build Vite (demo)
        working-directory: forges-monorepo/frontend
        env:
          VITE_API_URL: https://demo.forges-group.com/api
          VITE_ENV: demo
          VITE_COMMIT_SHA: ${{ github.sha }}
        run: npm run build

      - name: Upload dist frontend
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist-demo
          path: forges-monorepo/frontend/dist/
          retention-days: 1
          # Inclure .htaccess et autres fichiers caches (sinon SPA fallback perdu)
          include-hidden-files: true

  deploy:
    name: Déploiement sur demo
    runs-on: ubuntu-22.04
    needs: [build-push, build-frontend]
    environment:
      name: demo
      url: https://demo.forges-group.com

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download dist frontend
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist-demo
          path: frontend-dist/

      - name: Configurer SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          echo "${{ secrets.SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Transférer frontend (rsync)
        run: |
          rsync -rltz --delete --omit-dir-times --no-perms --no-group \
            --chmod=D755,F644 \
            --exclude='.env' --exclude='infra/' --exclude='uploads/' --exclude='prisma/' \
            frontend-dist/ \
            ${{ secrets.DEMO_SERVER_USER }}@${{ secrets.DEMO_SERVER_HOST }}:${{ secrets.DEMO_FRONTEND_DEPLOY_PATH }}/

      - name: Corriger permissions frontend
        run: |
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no \
            ${{ secrets.DEMO_SERVER_USER }}@${{ secrets.DEMO_SERVER_HOST }} \
            "find ${{ secrets.DEMO_FRONTEND_DEPLOY_PATH }} -not -path '*/.env' -not -path '*/infra/*' -not -path '*/uploads/*' -type f -exec chmod 644 {} \; && find ${{ secrets.DEMO_FRONTEND_DEPLOY_PATH }} -type d -exec chmod 755 {} \;"

      - name: Transférer docker-compose (rsync)
        run: |
          rsync -avz --mkpath \
            infra/docker/docker-compose.demo.deploy.yml \
            ${{ secrets.DEMO_SERVER_USER }}@${{ secrets.DEMO_SERVER_HOST }}:${{ secrets.DEMO_DEPLOY_PATH }}/infra/docker/

      - name: Transférer monitoring stack (rsync)
        run: |
          rsync -avz --mkpath --delete \
            --exclude='backups/' \
            forges-monorepo/infra/monitoring/ \
            ${{ secrets.DEMO_SERVER_USER }}@${{ secrets.DEMO_SERVER_HOST }}:${{ secrets.DEMO_DEPLOY_PATH }}/infra/monitoring/

      - name: Docker pull + migrate + restart
        env:
          DEPLOY_PATH: ${{ secrets.DEMO_DEPLOY_PATH }}
          SERVER_USER: ${{ secrets.DEMO_SERVER_USER }}
          SERVER_HOST: ${{ secrets.DEMO_SERVER_HOST }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          GHCR_USER: ${{ github.actor }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no $SERVER_USER@$SERVER_HOST \
            DEPLOY_PATH="$DEPLOY_PATH" \
            GHCR_TOKEN="$GHCR_TOKEN" \
            GHCR_USER="$GHCR_USER" \
            IMAGE_TAG="$IMAGE_TAG" \
            bash -s << 'ENDSSH'
              set -euo pipefail
              mkdir -p "$DEPLOY_PATH/infra/docker"
              cd "$DEPLOY_PATH"

              echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin

              sed -i '/^IMAGE_TAG=/d' .env && echo "IMAGE_TAG=$IMAGE_TAG" >> .env
              docker compose -f infra/docker/docker-compose.demo.deploy.yml --env-file .env pull backend

              # Nettoyage robuste : supprime TOUT container matchant le pattern env
              # (incluant containers hash-prefixed et residus en etat Created/Exited).
              # Les donnees sont preservees via les volumes nommes (forges-postgres-demo, forges-redis-demo).
              # Pas de docker network prune ici : il casserait les deploys paralleles test/dev.
              ZOMBIES=$(docker ps -a --format '{{.Names}}' | grep -E '(^|_)forges-(backend|postgres|redis)-demo$' || true)
              if [ -n "$ZOMBIES" ]; then
                echo "$ZOMBIES" | xargs -r docker rm -f 2>/dev/null || true
              fi

              docker compose -f infra/docker/docker-compose.demo.deploy.yml --env-file .env up -d

              echo "Attente healthcheck backend..."
              for i in $(seq 1 30); do
                STATUS=$(docker inspect --format='{{.State.Health.Status}}' forges-backend-demo 2>/dev/null || echo "missing")
                echo "  [$i/30] $STATUS"
                [ "$STATUS" = "healthy" ] && break
                sleep 5
              done
              # Le projet n'utilise pas de migrations versionnees (pas de prisma/migrations/).
              # On synchronise le schema avec `prisma db push` (idempotent).
              echo "Synchronisation schema Prisma (db push)..."
              for attempt in 1 2 3; do
                docker exec forges-backend-demo sh -c 'cd /app && npx prisma db push --skip-generate --accept-data-loss' && break
                echo "  Tentative $attempt echouee, retry dans 10s..."
                sleep 10
              done
              echo "Migrations OK"
          ENDSSH

      - name: Healthcheck
        run: |
          sleep 8
          HTTP_CODE=$(curl -sk -o /dev/null -w "%{http_code}" https://demo.forges-group.com/health || echo "000")
          [ "$HTTP_CODE" = "200" ] && echo "API OK" || echo "Healthcheck: $HTTP_CODE"

      - name: Start monitoring + notify team
        env:
          DEPLOY_PATH: ${{ secrets.DEMO_DEPLOY_PATH }}
          SERVER_USER: ${{ secrets.DEMO_SERVER_USER }}
          SERVER_HOST: ${{ secrets.DEMO_SERVER_HOST }}
          COMMIT_SHA: ${{ github.sha }}
          ACTOR: ${{ github.actor }}
        run: |
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no $SERVER_USER@$SERVER_HOST \
            DEPLOY_PATH="$DEPLOY_PATH" \
            COMMIT_SHA="$COMMIT_SHA" \
            ACTOR="$ACTOR" \
            'bash -s' <<'ENDSSH'
          set -euo pipefail
          cd "$DEPLOY_PATH"

          # Source le .env du VPS (contient SMTP_HOST, SMTP_PASS, ALERT_EMAIL_RECIPIENTS, etc.)
          set -a
          source .env
          set +a

          # --- Start monitoring stack ---
          cd "$DEPLOY_PATH/infra/monitoring"
          chmod +x monitoring-demo.sh
          docker network inspect forges-demo >/dev/null 2>&1 || docker network create forges-demo
          docker compose -f docker-compose.monitoring.demo.yml --env-file "$DEPLOY_PATH/.env" up -d --remove-orphans

          echo "Attente Grafana healthcheck..."
          for i in $(seq 1 12); do
            STATUS=$(docker inspect --format='{{.State.Health.Status}}' forges-grafana-demo 2>/dev/null || echo "starting")
            echo "  [$i/12] Grafana: $STATUS"
            [ "$STATUS" = "healthy" ] && break
            sleep 5
          done
          echo "Monitoring stack running."

          # --- Send notification email ---
          GRAFANA_URL="http://$(hostname -I | awk '{print $1}'):3050"
          GRAFANA_PWD="${GRAFANA_ADMIN_PASSWORD:-forges2026}"
          RECIPIENTS="${ALERT_EMAIL_RECIPIENTS:-$SMTP_USER}"
          MAILFILE=$(mktemp)
          printf "From: FORGES Monitoring <%s>\r\n" "$SMTP_USER" > "$MAILFILE"
          printf "To: %s\r\n" "$RECIPIENTS" >> "$MAILFILE"
          printf "Subject: [FORGES] Deploy DEMO OK + Grafana Access\r\n" >> "$MAILFILE"
          printf "Content-Type: text/plain; charset=UTF-8\r\n\r\n" >> "$MAILFILE"
          printf "Deploiement DEMO reussi.\n\n" >> "$MAILFILE"
          printf "--- Application ---\n" >> "$MAILFILE"
          printf "URL: https://demo.forges-group.com\n" >> "$MAILFILE"
          printf "Commit: %s\n" "$COMMIT_SHA" >> "$MAILFILE"
          printf "Par: %s\n\n" "$ACTOR" >> "$MAILFILE"
          printf "--- Grafana Monitoring ---\n" >> "$MAILFILE"
          printf "URL: %s\n" "$GRAFANA_URL" >> "$MAILFILE"
          printf "Login: admin\n" >> "$MAILFILE"
          printf "Password: %s\n\n" "$GRAFANA_PWD" >> "$MAILFILE"
          printf "--- Alertes configurees ---\n" >> "$MAILFILE"
          printf "- High Error Rate (>3 erreurs/min pendant 2min)\n" >> "$MAILFILE"
          printf "- Backend Down (0 logs pendant 3min)\n" >> "$MAILFILE"
          printf "Les alertes crash sont envoyees a: %s\n" "$RECIPIENTS" >> "$MAILFILE"
          curl --ssl-reqd \
            --url "smtps://${SMTP_HOST}:${SMTP_PORT:-465}" \
            --user "${SMTP_USER}:${SMTP_PASS}" \
            --mail-from "$SMTP_USER" \
            --mail-rcpt "$RECIPIENTS" \
            -T "$MAILFILE" || echo "WARN: Email send failed (non-blocking)"
          rm -f "$MAILFILE"
          echo "Notification email sent to ${RECIPIENTS}"
          ENDSSH

      - name: Résumé
        if: always()
        run: |
          echo "## Deploy DEMO — ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "| Champ | Valeur |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| URL | https://demo.forges-group.com |" >> $GITHUB_STEP_SUMMARY
          echo "| Grafana | http://VPS_IP:3050 (admin/\*\*\*) |" >> $GITHUB_STEP_SUMMARY
          echo "| Image | ${{ env.IMAGE_NAME }}:demo-${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Déployé par | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Alertes email | (from VPS .env) |" >> $GITHUB_STEP_SUMMARY

      - name: Nettoyer clé SSH
        if: always()
        run: rm -f ~/.ssh/id_rsa
