name: Deploy → https://demo.forges-group.com

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/forges-backend
  NODE_VERSION: '20'

jobs:
  build-push:
    name: Build image backend → GHCR
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push image backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/docker/Dockerfile.backend.prod
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:demo
            ${{ env.IMAGE_NAME }}:demo-${{ github.sha }}

  build-frontend:
    name: Build frontend Vite
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: forges-monorepo/frontend/package-lock.json

      - name: Installer dépendances frontend
        working-directory: forges-monorepo/frontend
        run: npm ci --no-audit --no-fund

      - name: Build Vite (demo)
        working-directory: forges-monorepo/frontend
        env:
          VITE_API_URL: https://demo.forges-group.com/api
          VITE_ENV: demo
        run: npm run build

      - name: Upload dist frontend
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist-demo
          path: forges-monorepo/frontend/dist/
          retention-days: 1

  deploy:
    name: Déploiement sur demo
    runs-on: ubuntu-22.04
    needs: [build-push, build-frontend]
    environment:
      name: demo
      url: https://demo.forges-group.com

    steps:
      - name: Download dist frontend
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist-demo
          path: frontend-dist/

      - name: Configurer SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          echo "${{ secrets.SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Transférer frontend (rsync)
        run: |
          rsync -avz --delete \
            frontend-dist/ \
            ${{ secrets.DEMO_SERVER_USER }}@${{ secrets.DEMO_SERVER_HOST }}:${{ secrets.DEMO_DEPLOY_PATH }}/public/

      - name: Docker pull + migrate + restart
        run: |
          ssh ${{ secrets.DEMO_SERVER_USER }}@${{ secrets.DEMO_SERVER_HOST }} bash -s << 'ENDSSH'
            set -euo pipefail
            cd ${{ secrets.DEMO_DEPLOY_PATH }}

            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            export IMAGE_TAG="${{ github.sha }}"
            docker compose -f infra/docker/docker-compose.demo.deploy.yml pull backend
            docker compose -f infra/docker/docker-compose.demo.deploy.yml up -d --remove-orphans

            sleep 10
            docker exec forges-backend-demo sh -c 'npx prisma migrate deploy'
            echo "Migrations OK"
          ENDSSH

      - name: Healthcheck
        run: |
          sleep 5
          HTTP_CODE=$(curl -sk -o /dev/null -w "%{http_code}" https://demo.forges-group.com/api/health || echo "000")
          echo "HEALTH=HTTP $HTTP_CODE" >> $GITHUB_ENV
          [ "$HTTP_CODE" = "200" ] && echo "API OK" || echo "Healthcheck: $HTTP_CODE"

      - name: Résumé
        if: always()
        run: |
          echo "## Deploy DEMO — ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "| Champ | Valeur |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| URL | https://demo.forges-group.com |" >> $GITHUB_STEP_SUMMARY
          echo "| Image | ${{ env.IMAGE_NAME }}:demo-${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Déployé par | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY

      - name: Nettoyer clé SSH
        if: always()
        run: rm -f ~/.ssh/id_rsa
