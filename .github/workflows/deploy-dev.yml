# =============================================================
# deploy-dev.yml — Déploiement automatique sur dev.forges-group.com
# Déclencheur : push sur la branche develop
#
# Secrets GitHub requis (environnement "dev") :
#   SSH_PRIVATE_KEY
#   SSH_KNOWN_HOSTS
#   DEV_SERVER_HOST        dev.forges-group.com
#   DEV_SERVER_USER        plesk-ssh-user
#   DEV_DEPLOY_PATH        /var/www/vhosts/.../httpdocs
#   DEV_DATABASE_URL
#   DEV_JWT_SECRET
#   DEV_JWT_REFRESH_SECRET
#   DEV_ENCRYPTION_KEY
#   DEV_HMAC_KEY
#   DEV_WEBHOOK_SECRET
#   DEV_SMTP_HOST
#   DEV_SMTP_USER
#   DEV_SMTP_PASS
#   DEV_PAYMENT_API_KEY
# =============================================================

name: Deploy → dev.forges-group.com

on:
  push:
    branches: [develop]

  workflow_dispatch:
    inputs:
      seed:
        description: 'Seed à exécuter (optionnel)'
        required: false
        default: 'none'
        type: choice
        options: ['none', 'seed-dev.js']

env:
  NODE_VERSION: '20'
  ENVIRONMENT: dev
  BACKEND_PORT: 3001

jobs:
  deploy:
    name: Déploiement sur dev
    runs-on: ubuntu-22.04
    environment:
      name: dev
      url: https://dev.forges-group.com

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: forges-monorepo/backend/package-lock.json

      # ── Build backend ──────────────────────────────────────
      - name: Installer dépendances backend
        working-directory: forges-monorepo/backend
        run: npm ci --no-audit --no-fund

      - name: Générer client Prisma
        working-directory: forges-monorepo/backend
        run: npx prisma generate

      - name: Tests unitaires (bloquants)
        working-directory: forges-monorepo/backend
        env:
          NODE_ENV: test
          DATABASE_URL: ${{ secrets.DEV_DATABASE_URL }}
          JWT_SECRET: ${{ secrets.DEV_JWT_SECRET }}
          JWT_REFRESH_SECRET: ${{ secrets.DEV_JWT_REFRESH_SECRET }}
          ENCRYPTION_KEY: ${{ secrets.DEV_ENCRYPTION_KEY }}
          HMAC_KEY: ${{ secrets.DEV_HMAC_KEY }}
          WEBHOOK_SECRET: ${{ secrets.DEV_WEBHOOK_SECRET }}
          FRONTEND_URL: https://dev.forges-group.com
        run: npm run test

      - name: Compiler TypeScript
        working-directory: forges-monorepo/backend
        run: npm run build

      # ── Build frontend ─────────────────────────────────────
      - name: Installer dépendances frontend
        working-directory: forges-monorepo/frontend
        run: npm ci --no-audit --no-fund

      - name: Build Vite (dev)
        working-directory: forges-monorepo/frontend
        env:
          VITE_API_URL: https://dev.forges-group.com/api
          VITE_ENV: dev
        run: npm run build

      # ── Déploiement SSH ────────────────────────────────────
      - name: Configurer SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          echo "${{ secrets.SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Transférer backend (rsync)
        run: |
          rsync -avz --delete \
            --exclude='.env*' \
            --exclude='node_modules/.cache' \
            --exclude='*.test.js' \
            --exclude='*.spec.js' \
            forges-monorepo/backend/dist/ \
            forges-monorepo/backend/package.json \
            forges-monorepo/backend/package-lock.json \
            forges-monorepo/backend/prisma/ \
            forges-monorepo/backend/node_modules/ \
            ${{ secrets.DEV_SERVER_USER }}@${{ secrets.DEV_SERVER_HOST }}:${{ secrets.DEV_DEPLOY_PATH }}/

      - name: Transférer frontend (rsync)
        run: |
          rsync -avz --delete \
            forges-monorepo/frontend/dist/ \
            ${{ secrets.DEV_SERVER_USER }}@${{ secrets.DEV_SERVER_HOST }}:${{ secrets.DEV_DEPLOY_PATH }}/public/

      # ── Migrations + Redémarrage ───────────────────────────
      - name: Migrations Prisma + Redémarrage Passenger
        run: |
          ssh ${{ secrets.DEV_SERVER_USER }}@${{ secrets.DEV_SERVER_HOST }} << 'ENDSSH'
            set -euo pipefail
            cd "${{ secrets.DEV_DEPLOY_PATH }}"

            cat > .env.dev << ENVEOF
DATABASE_URL=${{ secrets.DEV_DATABASE_URL }}
NODE_ENV=development
JWT_SECRET=${{ secrets.DEV_JWT_SECRET }}
JWT_REFRESH_SECRET=${{ secrets.DEV_JWT_REFRESH_SECRET }}
ENCRYPTION_KEY=${{ secrets.DEV_ENCRYPTION_KEY }}
HMAC_KEY=${{ secrets.DEV_HMAC_KEY }}
WEBHOOK_SECRET=${{ secrets.DEV_WEBHOOK_SECRET }}
SMTP_HOST=${{ secrets.DEV_SMTP_HOST }}
SMTP_USER=${{ secrets.DEV_SMTP_USER }}
SMTP_PASS=${{ secrets.DEV_SMTP_PASS }}
PAYMENT_API_KEY=${{ secrets.DEV_PAYMENT_API_KEY }}
FRONTEND_URL=https://dev.forges-group.com
PORT=3001
ENVEOF

            FAILED=$(npx prisma migrate status 2>/dev/null | grep 'failed' | awk '{print $1}' | head -1)
            [ -n "$FAILED" ] && npx prisma migrate resolve --rolled-back "$FAILED" 2>/dev/null || true

            export DATABASE_URL="${{ secrets.DEV_DATABASE_URL }}"
            npx prisma migrate deploy
            echo "Migrations OK"

            mkdir -p tmp && touch tmp/restart.txt
            echo "Passenger redémarré"

            if [ -f infra/docker-compose.yml ]; then
              RUNNING=$(docker compose -f infra/docker-compose.yml ps --status running --quiet 2>/dev/null | wc -l)
              [ "$RUNNING" -lt 2 ] && docker compose -f infra/docker-compose.yml up -d || echo "Containers actifs"
            fi
          ENDSSH

      # ── Seed (optionnel) ───────────────────────────────────
      - name: Seed (si demandé)
        if: ${{ github.event.inputs.seed != 'none' && github.event.inputs.seed != '' }}
        run: |
          SEED_FILE="${{ github.event.inputs.seed }}"
          ssh ${{ secrets.DEV_SERVER_USER }}@${{ secrets.DEV_SERVER_HOST }} << ENDSSH
            set -euo pipefail
            cd "${{ secrets.DEV_DEPLOY_PATH }}"
            export DATABASE_URL="${{ secrets.DEV_DATABASE_URL }}"
            [ ! -f "prisma/$SEED_FILE" ] && echo "prisma/$SEED_FILE introuvable" && exit 0
            node "prisma/$SEED_FILE" --reset
            echo "Seed $SEED_FILE exécuté"
          ENDSSH

      # ── Healthcheck ────────────────────────────────────────
      - name: Healthcheck post-déploiement
        run: |
          sleep 5
          HTTP_CODE=$(curl -sk -o /dev/null -w "%{http_code}" \
            https://${{ secrets.DEV_SERVER_HOST }}/api/health || echo "000")
          echo "Healthcheck : $HTTP_CODE"
          if [ "$HTTP_CODE" == "200" ]; then
            echo "API opérationnelle"
            echo "HEALTH=OK (HTTP 200)" >> $GITHUB_ENV
          else
            echo "Healthcheck retourné $HTTP_CODE"
            echo "HEALTH=HTTP $HTTP_CODE" >> $GITHUB_ENV
          fi

      # ── Résumé ────────────────────────────────────────────
      - name: Résumé déploiement dev
        if: always()
        run: |
          echo "## Déploiement DEV — ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Champ | Valeur |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Environnement | dev |" >> $GITHUB_STEP_SUMMARY
          echo "| URL | https://dev.forges-group.com |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Healthcheck | ${{ env.HEALTH || '—' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Déployé par | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Date | $(date '+%Y-%m-%d %H:%M UTC') |" >> $GITHUB_STEP_SUMMARY

      # ── Nettoyage ─────────────────────────────────────────
      - name: Nettoyer clé SSH
        if: always()
        run: rm -f ~/.ssh/id_rsa
