name: Deploy → https://dev.forges-group.com

on:
  push:
    branches: [develop]
  workflow_dispatch:

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/forges-backend
  NODE_VERSION: '20'

jobs:
  build-push:
    name: Build image backend → GHCR
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push image backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/docker/Dockerfile.backend.prod
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:dev
            ${{ env.IMAGE_NAME }}:dev-${{ github.sha }}

  build-frontend:
    name: Build frontend Vite
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: forges-monorepo/frontend/package-lock.json

      - name: Installer dépendances frontend
        working-directory: forges-monorepo/frontend
        run: npm ci --no-audit --no-fund

      - name: Build Vite (dev)
        working-directory: forges-monorepo/frontend
        env:
          VITE_API_URL: https://dev.forges-group.com/api
          VITE_ENV: dev
        run: npm run build

      - name: Upload dist frontend
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist-dev
          path: forges-monorepo/frontend/dist/
          retention-days: 1

  deploy:
    name: Déploiement sur dev
    runs-on: ubuntu-22.04
    needs: [build-push, build-frontend]
    environment:
      name: dev
      url: https://dev.forges-group.com

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download dist frontend
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist-dev
          path: frontend-dist/

      - name: Configurer SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          echo "${{ secrets.SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Transférer frontend (rsync)
        run: |
          rsync -avz --delete \
            frontend-dist/ \
            ${{ secrets.DEV_SERVER_USER }}@${{ secrets.DEV_SERVER_HOST }}:${{ secrets.DEV_DEPLOY_PATH }}/public/

      - name: Transférer docker-compose (rsync)
        run: |
          rsync -avz \
            infra/docker/docker-compose.docker-compose.dev.deploy.yml \
            ${{ secrets.DEV_SERVER_USER }}@${{ secrets.DEV_SERVER_HOST }}:${{ secrets.DEV_DEPLOY_PATH }}/infra/docker/

      - name: Docker pull + migrate + restart
        env:
          DEPLOY_PATH: ${{ secrets.DEV_DEPLOY_PATH }}
          SERVER_USER: ${{ secrets.DEV_SERVER_USER }}
          SERVER_HOST: ${{ secrets.DEV_SERVER_HOST }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no $SERVER_USER@$SERVER_HOST \
            DEPLOY_PATH="$DEPLOY_PATH" \
            GHCR_TOKEN="$GHCR_TOKEN" \
            GHCR_USER="$GHCR_USER" \
            IMAGE_TAG="$IMAGE_TAG" \
            bash -s << 'ENDSSH'
              set -euo pipefail
              cd "$DEPLOY_PATH"

              echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin

              export IMAGE_TAG="$IMAGE_TAG"
              docker compose -f infra/docker/docker-compose.docker-compose.dev.deploy.yml --env-file .env pull backend
              docker compose -f infra/docker/docker-compose.docker-compose.dev.deploy.yml --env-file .env up -d --remove-orphans

              sleep 10
              docker exec forges-backend-dev sh -c 'npx prisma migrate deploy'
              echo "Migrations OK"
          ENDSSH

      - name: Healthcheck
        run: |
          sleep 8
          HTTP_CODE=$(curl -sk -o /dev/null -w "%{http_code}" https://dev.forges-group.com/api/health || echo "000")
          [ "$HTTP_CODE" = "200" ] && echo "API OK" || echo "Healthcheck: $HTTP_CODE"

      - name: Résumé
        if: always()
        run: |
          echo "## Deploy DEV — ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "| Champ | Valeur |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| URL | https://dev.forges-group.com |" >> $GITHUB_STEP_SUMMARY
          echo "| Image | ${{ env.IMAGE_NAME }}:dev-${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Déployé par | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY

      - name: Nettoyer clé SSH
        if: always()
        run: rm -f ~/.ssh/id_rsa
