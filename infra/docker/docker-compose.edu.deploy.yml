name: forges-edu

services:
  postgres:
    image: postgres:16-alpine
    container_name: forges-postgres-edu
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-edu-data:/var/lib/postgresql/data
    networks:
      - forges-edu
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: forges-redis-edu
    restart: unless-stopped
    command: ["sh", "-c", "redis-server --appendonly yes --requirepass \"$REDIS_PASSWORD\""]
    volumes:
      - redis-edu-data:/data
    networks:
      - forges-edu
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ${BACKEND_IMAGE_REF}
    container_name: forges-backend-edu
    restart: unless-stopped
    labels:
      com.docker.compose.project: forges-edu
      com.docker.compose.service: backend
      environment: edu
      service: backend
    env_file:
      - /var/www/vhosts/edu.forges-group.com/httpdocs/.env
    environment:
      DATABASE_URL: "postgresql://forges_edu:SqwbMP5BBpk4NRbylRWibWq@postgres:5432/forges_edu"
      NODE_ENV: development
      FRONTEND_URL: ${FRONTEND_URL:-https://edu.forges-group.com}
      PORT: ${BACKEND_INTERNAL_PORT}
      BACKEND_PORT: ${BACKEND_INTERNAL_PORT}
      POSTGRES_HOST: postgres
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      RUN_PRISMA_MIGRATE_DEPLOY: "true"
      AUTO_SEED: "false"
    ports:
      - "${BACKEND_PORT}:${BACKEND_INTERNAL_PORT}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - forges-edu
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://127.0.0.1:${BACKEND_INTERNAL_PORT}/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

networks:
  forges-edu:
    name: forges-edu
    driver: bridge

volumes:
  postgres-edu-data:
    name: forges-postgres-edu
  redis-edu-data:
    name: forges-redis-edu
