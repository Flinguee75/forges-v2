version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: forges-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-forges}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-forges_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-forges_db}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-forges}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - forges-network

  redis:
    image: redis:7-alpine
    container_name: forges-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-forges_redis_password} --appendonly yes
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - forges-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  forges-network:
    driver: bridge
