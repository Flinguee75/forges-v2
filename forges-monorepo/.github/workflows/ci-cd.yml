name: FORGES CI/CD Pipeline

on:
  push:
    branches: [dev, develop, main]
    tags: ['v*']
  pull_request:
    branches: [dev, develop, main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environnement cible'
        required: true
        type: choice
        options: [dev, test, demo, edu]
      seed_database:
        description: 'Executer le seed ?'
        type: boolean
        default: false
      run_integration:
        description: 'Executer les tests integration backend cibles ?'
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: forges-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      deploy: ${{ steps.filter.outputs.deploy }}
      integration: ${{ steps.filter.outputs.integration }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: filter
        name: Classify changed paths
        shell: bash
        run: |
          set -euo pipefail

          backend=false
          frontend=false
          deploy=false
          integration=false

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            backend=true
            frontend=true
            deploy=true
            if [[ "${{ github.event.inputs.run_integration }}" == "true" ]]; then
              integration=true
            fi
          elif [[ "${{ github.ref_type }}" == "tag" ]]; then
            backend=true
            frontend=true
            deploy=true
          else
            if [[ "${{ github.event_name }}" == "pull_request" ]]; then
              base="${{ github.event.pull_request.base.sha }}"
              head="${{ github.event.pull_request.head.sha }}"
            else
              base="${{ github.event.before }}"
              head="${{ github.sha }}"
              if [[ -z "$base" || "$base" =~ ^0+$ ]]; then
                base="HEAD~1"
              fi
            fi

            changed_files="$(git diff --name-only "$base" "$head")"
            if grep -qE '^(backend/|\.github/workflows/ci-cd\.yml)' <<< "$changed_files"; then
              backend=true
              deploy=true
            fi
            if grep -qE '^(frontend/|\.github/workflows/ci-cd\.yml)' <<< "$changed_files"; then
              frontend=true
              deploy=true
            fi
            if grep -qE '^(infra/|\.github/workflows/ci-cd\.yml)' <<< "$changed_files"; then
              deploy=true
            fi
          fi

          {
            echo "backend=$backend"
            echo "frontend=$frontend"
            echo "deploy=$deploy"
            echo "integration=$integration"
          } >> "$GITHUB_OUTPUT"

  backend-fast:
    name: Backend fast checks
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci

      - name: Lint backend
        run: npm run lint

      - name: Build backend
        run: npm run build

      - name: Run backend unit tests
        run: npm test -- --runInBand

  frontend-fast:
    name: Frontend fast checks
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint

      - name: Build frontend
        run: npm run build

      - name: Run frontend tests
        run: npm test -- --run

  backend-integration-targeted:
    name: Backend targeted integration
    runs-on: ubuntu-latest
    needs: [changes, backend-fast]
    if: needs.changes.outputs.integration == 'true'
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: forges
          POSTGRES_USER: forges
          POSTGRES_PASSWORD: forges_secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U forges -d forges"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://forges:forges_secret@localhost:5432/forges?connection_limit=10
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci_jwt_secret_minimum_32_characters
      JWT_REFRESH_SECRET: ci_refresh_secret_minimum_32_chars
      ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef
      PAYMENT_WEBHOOK_SECRET: ci_webhook_secret
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci

      - name: Apply database migrations
        run: npx prisma migrate deploy

      - name: Run targeted integration tests
        run: >
          npm run test:integration -- --runTestsByPath
          tests/integration/rm-business-financier.test.js
          tests/integration/rm-dossiers.test.js
          tests/integration/rm-vague4-sessions-paiements.test.js
          tests/integration/rm-abonnements.test.js
          tests/integration/rm-vague3-abonnements-retail.test.js
          tests/integration/rm-vague3-abonnements.test.js

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [changes, backend-fast, frontend-fast, backend-integration-targeted]
    if: >
      always()
      && needs.changes.outputs.deploy == 'true'
      && (needs.backend-fast.result == 'success' || needs.backend-fast.result == 'skipped')
      && (needs.frontend-fast.result == 'success' || needs.frontend-fast.result == 'skipped')
      && (needs.backend-integration-targeted.result == 'success' || needs.backend-integration-targeted.result == 'skipped')
      && (
        github.event_name == 'workflow_dispatch'
        || github.ref_name == 'main'
        || github.ref_name == 'dev'
        || github.ref_name == 'develop'
        || github.base_ref == 'main'
        || github.base_ref == 'dev'
        || github.base_ref == 'develop'
        || startsWith(github.ref, 'refs/tags/v')
      )
    steps:
      - uses: actions/checkout@v4

      - name: Deploy
        shell: bash
        run: |
          set -euo pipefail

          ENV="${{ github.event.inputs.environment }}"
          if [[ -z "$ENV" ]]; then
            TARGET_REF="${{ github.base_ref || github.ref_name }}"
            [[ "${{ github.ref_type }}" == "tag" ]] && ENV="demo"
            [[ "$TARGET_REF" == "main" ]] && ENV="edu"
            [[ "$TARGET_REF" == "dev" ]] && ENV="dev"
            [[ "$TARGET_REF" == "develop" ]] && ENV="dev"
          fi

          if [[ -z "$ENV" ]]; then
            echo "Aucun environnement deploy resolu pour ref=${{ github.ref_name }} base=${{ github.base_ref }}"
            exit 1
          fi

          TAG="${{ github.ref_name }}"
          [[ "${{ github.ref_type }}" == "tag" ]] && TAG="${{ github.ref_name }}"

          export FORCE_SEED="${{ github.event.inputs.seed_database }}"
          chmod +x infra/scripts/deploy.sh
          ./infra/scripts/deploy.sh "$ENV" "$TAG"
