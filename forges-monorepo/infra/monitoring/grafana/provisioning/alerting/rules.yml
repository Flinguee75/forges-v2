apiVersion: 1

groups:
  - orgId: 1
    name: FORGES Demo Alerts
    folder: FORGES Monitoring
    interval: 1m
    rules:
      - uid: forges-demo-error-rate
        title: "DEMO - High Error Rate"
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: loki
            model:
              expr: 'sum(rate({environment="demo", level="error"} [5m]))'
              refId: A
          - refId: C
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              refId: C
              conditions:
                - evaluator:
                    type: gt
                    params: [0.05]
                  operator:
                    type: and
                  reducer:
                    type: last
              expression: A
        for: 2m
        noDataState: OK
        execErrState: Alerting
        labels:
          severity: critical
          environment: demo
        annotations:
          summary: "Error rate > 0.05/s on DEMO backend"
          description: "Le backend DEMO produit plus de 3 erreurs/minute. Verifier les logs Grafana."

      - uid: forges-demo-backend-down
        title: "DEMO - Backend Container Down"
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: loki
            model:
              expr: 'count_over_time({environment="demo", service="backend"} [5m])'
              refId: A
          - refId: C
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              refId: C
              conditions:
                - evaluator:
                    type: lt
                    params: [1]
                  operator:
                    type: and
                  reducer:
                    type: last
              expression: A
        for: 3m
        noDataState: Alerting
        execErrState: Alerting
        labels:
          severity: critical
          environment: demo
        annotations:
          summary: "Backend DEMO ne produit plus de logs (probablement down)"
          description: "Aucun log du backend DEMO depuis 5 minutes. Le container est probablement crash ou arrete."
