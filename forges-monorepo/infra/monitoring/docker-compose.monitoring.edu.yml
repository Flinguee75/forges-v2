name: forges-monitoring-edu

services:
  loki:
    image: grafana/loki:3.1.0
    container_name: forges-loki-edu
    restart: unless-stopped
    ports:
      - "3102:3100"
    volumes:
      - ./loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki-edu-data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3100/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - forges-monitoring-edu

  promtail:
    image: grafana/promtail:3.1.0
    container_name: forges-promtail-edu
    restart: unless-stopped
    volumes:
      - ./promtail-config.edu.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      loki:
        condition: service_healthy
    networks:
      - forges-monitoring-edu
      - forges-edu

  grafana:
    image: grafana/grafana:11.1.0
    container_name: forges-grafana-edu
    restart: unless-stopped
    ports:
      - "3052:3000"
    env_file:
      - .env.monitoring.edu
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-forges2026}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-http://localhost:3052}
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/forges-edu.json
      GF_SMTP_ENABLED: "true"
      GF_SMTP_HOST: ${SMTP_HOST:-smtp.forges-group.com}:${SMTP_PORT:-587}
      GF_SMTP_USER: ${SMTP_USER:-noreply@forges-group.com}
      GF_SMTP_PASSWORD: ${SMTP_PASS}
      GF_SMTP_FROM_ADDRESS: ${SMTP_USER:-noreply@forges-group.com}
      GF_SMTP_FROM_NAME: FORGES Monitoring
      GF_SMTP_SKIP_VERIFY: "false"
      GF_UNIFIED_ALERTING_ENABLED: "true"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-edu-data:/var/lib/grafana
    depends_on:
      loki:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - forges-monitoring-edu

  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: forges-uptime-edu
    restart: unless-stopped
    ports:
      - "3007:3001"
    volumes:
      - uptime-edu-data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/api/entry-page || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - forges-monitoring-edu

  checker:
    image: alpine/curl:latest
    container_name: forges-checker-edu
    restart: unless-stopped
    volumes:
      - ./silent-check.sh:/silent-check.sh:ro
    command: sh /silent-check.sh
    environment:
      FORGES_BASE_URL: http://forges-backend-edu:3006
      FORGES_ENVIRONMENT: edu
      CHECK_INTERVAL: "300"
    depends_on:
      - loki
    networks:
      - forges-monitoring-edu
      - forges-edu

networks:
  forges-monitoring-edu:
    name: forges-monitoring-edu
    driver: bridge
  forges-edu:
    name: forges-edu
    external: true

volumes:
  loki-edu-data:
    name: forges-loki-edu
  grafana-edu-data:
    name: forges-grafana-edu
  uptime-edu-data:
    name: forges-uptime-edu
