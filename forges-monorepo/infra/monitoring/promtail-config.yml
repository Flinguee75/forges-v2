# Promtail Configuration
# Collecte des logs Docker — filtrage via labels Docker Compose
# NOTE: ce fichier est conserve comme reference. En production, chaque env
# utilise son propre fichier (promtail-config.dev.yml, promtail-config.edu.yml).

server:
  http_listen_port: 9080
  log_level: info

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: forges-dev
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: ['__meta_docker_container_label_com_docker_compose_project']
        regex: '^forges-dev$'
        action: keep
      - source_labels: ['__meta_docker_container_name']
        target_label: container
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: service
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: service_name
      - target_label: environment
        replacement: dev
      - target_label: job
        replacement: forges-dev
      - source_labels: ['__meta_docker_container_id']
        regex: '(.+)'
        target_label: __path__
        replacement: '/var/lib/docker/containers/$1/$1-json.log'
    pipeline_stages:
      - json:
          expressions:
            level: level
      - labels:
          level:

  - job_name: forges-test
