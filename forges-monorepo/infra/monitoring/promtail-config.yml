server:
  http_listen_port: 9080
  grpc_listen_port: 0
  log_level: warn

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: forges-demo-containers
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          - name: label
            values: ["environment=demo"]
    relabel_configs:
      - source_labels: ["__meta_docker_container_name"]
        regex: "/(.*)"
        target_label: container
      - source_labels: ["__meta_docker_container_label_environment"]
        target_label: environment
      - source_labels: ["__meta_docker_container_label_service"]
        target_label: service
      - source_labels: ["__meta_docker_container_label_com_docker_compose_service"]
        target_label: compose_service
    pipeline_stages:
      - docker: {}
      - json:
          expressions:
            level: level
            msg: message
      - labels:
          level:
      - timestamp:
          source: time
          format: RFC3339Nano
          fallback_formats:
            - "2006-01-02T15:04:05Z07:00"

  - job_name: forges-demo-backend
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          - name: name
            values: ["forges-backend-demo"]
    relabel_configs:
      - source_labels: ["__meta_docker_container_name"]
        regex: "/(.*)"
        target_label: container
      - target_label: environment
        replacement: demo
      - target_label: service
        replacement: backend
    pipeline_stages:
      - docker: {}
      - json:
          expressions:
            level: level
            msg: message
            context: context
      - labels:
          level:
          context:

  - job_name: forges-demo-postgres
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 10s
        filters:
          - name: name
            values: ["forges-postgres-demo"]
    relabel_configs:
      - source_labels: ["__meta_docker_container_name"]
        regex: "/(.*)"
        target_label: container
      - target_label: environment
        replacement: demo
      - target_label: service
        replacement: postgres
    pipeline_stages:
      - docker: {}

  - job_name: forges-demo-redis
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 10s
        filters:
          - name: name
            values: ["forges-redis-demo"]
    relabel_configs:
      - source_labels: ["__meta_docker_container_name"]
        regex: "/(.*)"
        target_label: container
      - target_label: environment
        replacement: demo
      - target_label: service
        replacement: redis
    pipeline_stages:
      - docker: {}
