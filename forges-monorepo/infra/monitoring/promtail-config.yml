# Promtail Configuration
# Collecte des logs Docker — filtrage via labels Docker Compose

server:
  http_listen_port: 9080
  log_level: info

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: forges-dev
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: ['__meta_docker_container_label_com_docker_compose_project']
        regex: 'forges-dev'
        action: keep
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: service
      - target_label: environment
        replacement: dev
      - target_label: job
        replacement: forges-dev
    pipeline_stages:
      - json:
          expressions:
            level: level
      - labels:
          level:

  - job_name: forges-test
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: ['__meta_docker_container_label_com_docker_compose_project']
        regex: 'forges-test'
        action: keep
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: service
      - target_label: environment
        replacement: test
      - target_label: job
        replacement: forges-test

  - job_name: forges-demo
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: ['__meta_docker_container_label_com_docker_compose_project']
        regex: 'forges-demo'
        action: keep
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: service
      - target_label: environment
        replacement: demo
      - target_label: job
        replacement: forges-demo
    pipeline_stages:
      - json:
          expressions:
            level: level
      - labels:
          level:
